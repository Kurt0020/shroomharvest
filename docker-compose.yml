services:
  mysql:
    image: mysql:8.0
    container_name: shroomharvest-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-shroomharvest}
      MYSQL_USER: ${MYSQL_USER:-shroomharvest_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-shroomharvest_pass}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - shroomharvest_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional lightweight DB browser. Visit http://localhost:8081
  adminer:
    image: adminer:latest
    container_name: shroomharvest-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - mysql

volumes:
  shroomharvest_mysql_data:
